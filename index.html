<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#FBF6F2; --surface:#FFFFFF; --ink:#3A2E2B; --ink-soft:#8A7A72;
    --accent:#E08D79; --accent-d:#C76B5A; --gold:#C9A24B; --line:#EADED6;
    --shadow:0 18px 40px -24px rgba(58,46,43,.45);
  }
  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  @media (prefers-reduced-motion: reduce){ html{ scroll-behavior:auto; } *{ animation:none!important; transition:none!important; } }
  body{ margin:0; background:var(--paper); color:var(--ink);
    font-family:"Nunito Sans",system-ui,sans-serif; line-height:1.6; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:760px; margin:0 auto; padding:0 22px; }

  .hero{ padding:84px 0 48px; text-align:center; }
  .eyebrow{ font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); font-weight:700; margin-bottom:20px; }
  .hero h1{ font-family:"Fraunces",serif; font-weight:600; font-optical-sizing:auto;
    font-size:clamp(52px,12vw,92px); line-height:.96; margin:0; letter-spacing:-.01em; }
  .hero .tag{ font-family:"Fraunces",serif; font-style:italic; font-weight:500;
    color:var(--accent-d); font-size:clamp(18px,4.5vw,24px); margin-top:14px; }
  .hero .meta{ margin-top:26px; font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-soft); font-weight:700; }
  .hero .meta b{ color:var(--ink); }
  .hero .dot{ display:inline-block; margin:0 10px; color:var(--line); }

  .timeline{ position:relative; padding:24px 0 40px; }
  .timeline:before{ content:""; position:absolute; left:11px; top:0; bottom:64px; width:2px; background:linear-gradient(var(--line), transparent); }
  @media(min-width:620px){ .timeline:before{ left:50%; transform:translateX(-1px); bottom:80px; } }

  .chapter{ position:relative; padding-left:44px; margin-bottom:56px; }
  @media(min-width:620px){
    .chapter{ width:calc(50% - 30px); padding-left:0; }
    .chapter.left{ margin-right:auto; text-align:right; padding-right:38px; }
    .chapter.right{ margin-left:auto; padding-left:38px; }
  }
  .node{ position:absolute; left:4px; top:6px; width:16px; height:16px; border-radius:50%;
    background:var(--surface); border:2px solid var(--accent); z-index:2; }
  .chapter.milestone .node{ background:var(--gold); border-color:var(--gold); box-shadow:0 0 0 5px rgba(201,162,75,.16); }
  @media(min-width:620px){
    .left .node{ left:auto; right:-38px; transform:translateX(50%); }
    .right .node{ left:-38px; transform:translateX(-50%); }
  }
  .date{ font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-soft); font-weight:700; margin-bottom:6px; }
  .milestone .date{ color:var(--gold); }
  .badge{ display:inline-block; font-size:10px; letter-spacing:.14em; text-transform:uppercase; font-weight:800;
    color:#fff; background:var(--gold); padding:3px 9px; border-radius:99px; margin-bottom:8px; vertical-align:middle; }
  .chapter h2{ font-family:"Fraunces",serif; font-weight:600; font-size:24px; line-height:1.15; margin:0 0 10px; }
  .note{ color:var(--ink); margin:0 0 16px; font-size:16px; }

  .photos{ display:grid; gap:8px; }
  .photos.n1{ grid-template-columns:1fr; }
  .photos.n2,.photos.n3,.photos.n4{ grid-template-columns:1fr 1fr; }
  .photos img, .ph{ width:100%; aspect-ratio:4/5; object-fit:cover; border-radius:14px; display:block; box-shadow:var(--shadow); background:var(--surface); }
  .ph{ display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px;
    border:1.5px dashed var(--line); box-shadow:none; background:linear-gradient(150deg,#fff,#FBEEE8); color:var(--ink-soft); }
  .ph svg{ width:30px; height:30px; opacity:.6; }
  .ph span{ font-size:12px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; }

  .ba{ position:relative; border-radius:16px; overflow:hidden; box-shadow:var(--shadow); aspect-ratio:4/5; user-select:none; touch-action:none; background:#000; }
  .ba img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .ba .after-clip{ overflow:hidden; position:absolute; inset:0; width:50%; }
  .ba .after-clip img{ width:auto; }
  .ba .handle{ position:absolute; top:0; bottom:0; left:50%; width:2px; background:#fff; box-shadow:0 0 0 1px rgba(0,0,0,.15); z-index:3; }
  .ba .grip{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; border-radius:50%;
    background:#fff; z-index:4; display:flex; align-items:center; justify-content:center; color:var(--accent-d); box-shadow:0 4px 14px rgba(0,0,0,.3); font-size:18px; cursor:ew-resize; }
  .ba .lab{ position:absolute; bottom:12px; z-index:3; font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
    color:#fff; padding:4px 10px; border-radius:99px; background:rgba(0,0,0,.4); }
  .ba .lab.l{ left:12px; } .ba .lab.r{ right:12px; }
  .ba input[type=range]{ position:absolute; inset:0; width:100%; height:100%; opacity:0; cursor:ew-resize; margin:0; z-index:5; }
  .ba input:focus-visible + .handle .grip{ outline:3px solid var(--accent); outline-offset:3px; }

  footer{ text-align:center; padding:40px 0 70px; color:var(--ink-soft); }
  footer .heart{ color:var(--accent); }
  footer p{ font-size:13px; margin:6px 0; }
  footer .priv{ font-size:11px; letter-spacing:.08em; opacity:.8; max-width:380px; margin:14px auto 0; }
</style>

<div class="wrap">
  <header class="hero">
    <div class="eyebrow">Дневник прогресса</div>
    <h1 id="h-name"></h1>
    <div class="tag" id="h-tag"></div>
    <div class="meta" id="h-meta"></div>
  </header>
  <main class="timeline" id="timeline"></main>
  <footer>
    <p>Сделано с <span class="heart">&hearts;</span> для самого важного человека</p>
    <p class="priv">Это семейный дневник. Страница закрыта от поисковиков — делись только прямой ссылкой с близкими.</p>
  </footer>
</div>

<script>
  const PH_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.8"/><path d="M21 16l-5-5L5 21"/></svg>';
  function photoHTML(src, alt){
    if(!src) return '<div class="ph">'+PH_ICON+'<span>здесь будет фото</span></div>';
    return '<img src="'+src+'" alt="'+(alt||'')+'" loading="lazy" onerror="this.outerHTML=\'<div class=&quot;ph&quot;>'+PH_ICON.replace(/"/g,'&quot;')+'<span>добавь фото</span></div>\'">';
  }
  function beforeAfter(ba, idx){
    if(!(ba.before && ba.after)) return '<div class="photos n2">'+photoHTML(ba.before,'было')+photoHTML(ba.after,'стало')+'</div>';
    const id='ba'+idx;
    return '<div class="ba" id="'+id+'">'+
      '<img src="'+ba.before+'" alt="было">'+
      '<div class="after-clip" id="'+id+'-clip"><img src="'+ba.after+'" alt="стало"></div>'+
      '<div class="lab l">'+(ba.beforeLabel||'было')+'</div><div class="lab r">'+(ba.afterLabel||'стало')+'</div>'+
      '<input type="range" min="0" max="100" value="50" aria-label="Сравнить было и стало">'+
      '<div class="handle" id="'+id+'-handle"><div class="grip">&#10231;</div></div></div>';
  }
  function render(){
    document.getElementById('h-name').textContent = profile.name;
    document.getElementById('h-tag').textContent  = profile.tagline;
    document.getElementById('h-meta').innerHTML = 'Глав: <b>'+chapters.length+'</b> <span class="dot">&bull;</span> ведём с '+profile.since;
    const tl = document.getElementById('timeline');
    tl.innerHTML = chapters.map((c,i)=>{
      const side = i%2===0 ? 'left' : 'right'; let media='';
      if(c.beforeAfter){ media = beforeAfter(c.beforeAfter, i); }
      else { const ph=c.photos||[]; const n=Math.min(ph.length||1,4);
        const cells=(ph.length?ph:[null]).slice(0,4).map(p=>photoHTML(p,c.title)).join('');
        media='<div class="photos n'+n+'">'+cells+'</div>'; }
      return '<article class="chapter '+side+(c.milestone?' milestone':'')+'">'+
        '<div class="node"></div><div class="date">'+c.date+'</div>'+
        (c.milestone?'<div class="badge">&#9733; веха</div>':'')+
        '<h2>'+c.title+'</h2>'+(c.note?'<p class="note">'+c.note+'</p>':'')+media+'</article>';
    }).join('');
    chapters.forEach((c,i)=>{
      if(c.beforeAfter && c.beforeAfter.before && c.beforeAfter.after){
        const root=document.getElementById('ba'+i), clip=document.getElementById('ba'+i+'-clip'), handle=document.getElementById('ba'+i+'-handle'), range=root.querySelector('input');
        const move=v=>{ clip.style.width=v+'%'; handle.style.left=v+'%'; };
        range.addEventListener('input',e=>move(e.target.value)); move(50);
      }
    });
  }
  render();
</script>
